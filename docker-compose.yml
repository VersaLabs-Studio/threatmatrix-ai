# ThreatMatrix AI — Docker Compose (Production)

services:
  postgres:
    image: postgres:16-alpine
    container_name: tm-postgres
    environment:
      POSTGRES_DB: threatmatrix
      POSTGRES_USER: threatmatrix
      POSTGRES_PASSWORD: ${DB_PASSWORD:-threatmatrix_dev}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U threatmatrix"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: tm-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: tm-backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://threatmatrix:${DB_PASSWORD:-threatmatrix_dev}@postgres:5432/threatmatrix
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-threatmatrix-dev-secret}
      DEV_MODE: ${DEV_MODE:-false}
      CAPTURE_INTERFACE: ${CAPTURE_INTERFACE:-eth0}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      GLM_API_KEY: ${GLM_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      OTX_API_KEY: ${OTX_API_KEY:-}
      ABUSEIPDB_API_KEY: ${ABUSEIPDB_API_KEY:-}
      VIRUSTOTAL_API_KEY: ${VIRUSTOTAL_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/ml/saved_models:/app/ml/saved_models
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4
    restart: unless-stopped

  ml-worker:
    build: ./backend
    container_name: tm-ml-worker
    environment:
      DATABASE_URL: postgresql+asyncpg://threatmatrix:${DB_PASSWORD:-threatmatrix_dev}@postgres:5432/threatmatrix
      REDIS_URL: redis://redis:6379
    volumes:
      - ./backend/ml/saved_models:/app/ml/saved_models
    command: python -m ml.inference.worker
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

  capture:
    build: ./backend
    container_name: tm-capture
    network_mode: host
    privileged: true
    environment:
      DATABASE_URL: postgresql+asyncpg://threatmatrix:${DB_PASSWORD:-threatmatrix_dev}@localhost:5432/threatmatrix
      REDIS_URL: redis://localhost:6379
      CAPTURE_INTERFACE: ${CAPTURE_INTERFACE:-eth0}
      CAPTURE_ACTIVE_TIMEOUT: "30"
      CAPTURE_IDLE_TIMEOUT: "120"
    volumes:
      - ./pcaps:/app/pcaps
    command: python -m capture.engine
    depends_on:
      - redis
      - postgres
    restart: unless-stopped

volumes:
  pg_data:
  redis_data:
