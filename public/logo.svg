<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cyan-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f0ff" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Hexagonal Perimeter -->
  <path d="M100 20L170 60V140L100 180L30 140V60L100 20Z" 
        stroke="url(#cyan-gradient)" 
        stroke-width="2" 
        stroke-opacity="0.3" />
  
  <path d="M100 30L160 65V135L100 170L40 135V65L100 30Z" 
        stroke="url(#cyan-gradient)" 
        stroke-width="1" 
        stroke-opacity="0.1" />

  <!-- Central "TM" Mark -->
  <!-- Stylized "T" -->
  <path d="M70 70H130M100 70V130" 
        stroke="url(#cyan-gradient)" 
        stroke-width="8" 
        stroke-linecap="square" 
        filter="url(#glow)" />
  
  <!-- Stylized "M" integrated -->
  <path d="M75 130V95L100 115L125 95V130" 
        stroke="url(#cyan-gradient)" 
        stroke-width="4" 
        stroke-linecap="square" 
        filter="url(#glow)" />

  <!-- Data Pulse Points -->
  <circle cx="100" cy="20" r="3" fill="#00f0ff" filter="url(#glow)" />
  <circle cx="170" cy="60" r="3" fill="#00f0ff" filter="url(#glow)" />
  <circle cx="170" cy="140" r="3" fill="#00f0ff" filter="url(#glow)" />
  <circle cx="100" cy="180" r="3" fill="#00f0ff" filter="url(#glow)" />
  <circle cx="30" cy="140" r="3" fill="#00f0ff" filter="url(#glow)" />
  <circle cx="30" cy="60" r="3" fill="#00f0ff" filter="url(#glow)" />

</svg>
