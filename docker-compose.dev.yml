# ThreatMatrix AI — Docker Compose (Development Overrides)
# Usage: docker-compose -f docker-compose.yml -f docker-compose.dev.yml up
version: "3.8"

services:
  backend:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
    environment:
      DEBUG: "true"
      DATABASE_ECHO: "false"
