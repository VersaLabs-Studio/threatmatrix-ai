# ============================================================
# ThreatMatrix AI - Alembic Configuration
# ============================================================

[alembic]
# Migration script location
script_location = alembic

# Template for migration file names
# Use {rev} for revision ID, {slug} for message slug
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d%%(second).2d_%%(slug)s

# Database URL (overridden by env.py from app.config)
# This is a fallback for CLI usage without the app context
sqlalchemy.url = postgresql+asyncpg://threatmatrix:threatmatrix@localhost:5432/threatmatrix

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
